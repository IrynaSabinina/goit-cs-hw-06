version: "3.9"

services:

  web:
    build: .
    container_name: web_server
    command: python main.py
    ports:
      - "3000:3000"
    depends_on:
      - mongo

  socket:
    build: .
    container_name: socket_server
    command: python socket_server.py
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: